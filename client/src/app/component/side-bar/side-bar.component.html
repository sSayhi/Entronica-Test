<aside class="sidebar">
  <ul class="sidebar-menu">
    <ng-container *ngFor="let item of menuItems">
      <li *ngIf="!item.hide"
        [routerLink]="(item.withParams && externalUsername) ? [item.path, externalUsername] : [item.path]">
        {{ item.label }}
      </li>
    </ng-container>
  </ul>
</aside>
